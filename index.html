<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOTA SEOUL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 배경 및 로고 배치 최적화 */
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 로고 애니메이션 (미세한 페이드인) */
        .logo-fade {
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="logo-fade">
        <img src="logo_white.png" alt="IOTA SEOUL Logo" class="w-64 md:w-80 h-auto">
    </div>

</body>
</html>
